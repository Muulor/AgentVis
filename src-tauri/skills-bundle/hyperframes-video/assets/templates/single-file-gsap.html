<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hyperframes/core/dist/hyperframe.runtime.iife.js"></script>
    <style>
      :root {
        --bg: #101114;
        --ink: #f7f3ea;
        --muted: #a9a395;
        --accent: #f0b84f;
        --accent-2: #72d1c8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", sans-serif;
      }

      #main {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 22%, rgba(114, 209, 200, 0.22), transparent 28%),
          radial-gradient(circle at 80% 72%, rgba(240, 184, 79, 0.18), transparent 30%),
          var(--bg);
      }

      .scene {
        position: absolute;
        inset: 0;
      }

      .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        padding: 120px 160px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
      }

      .display {
        max-width: 1080px;
        margin: 0;
        font-family: "Arial Black", "Segoe UI", sans-serif;
        font-size: 116px;
        line-height: 0.96;
        font-weight: 800;
        letter-spacing: 0;
      }

      .body {
        max-width: 760px;
        margin: 0;
        color: var(--muted);
        font-size: 32px;
        line-height: 1.35;
      }

      .meta {
        display: inline-flex;
        width: max-content;
        align-items: center;
        gap: 12px;
        color: var(--accent);
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .orbital {
        position: absolute;
        right: 150px;
        bottom: 120px;
        width: 360px;
        height: 360px;
        border: 1px solid rgba(247, 243, 234, 0.22);
        border-radius: 50%;
      }

      .orbital::after {
        content: "";
        position: absolute;
        top: 34px;
        left: 168px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 34px rgba(114, 209, 200, 0.75);
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        opacity: 0.15;
        background-image:
          radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1.2px),
          radial-gradient(rgba(0, 0, 0, 0.22) 1px, transparent 1.2px);
        background-size: 3px 3px, 5px 5px;
        background-position: 0 0, 1px 2px;
        mix-blend-mode: overlay;
      }
    </style>
  </head>
  <body>
    <div
      id="main"
      data-composition-id="main"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="8"
    >
      <section class="scene clip" id="s1" data-start="0" data-duration="4" data-track-index="1">
        <div class="orbital" id="s1-orbit"></div>
        <div class="scene-content">
          <p class="meta" id="s1-meta">HyperFrames draft</p>
          <h1 class="display" id="s1-title">Replace this with the hook</h1>
          <p class="body" id="s1-body">Write a concise supporting line that can be read in under four seconds.</p>
        </div>
        <div class="grain"></div>
      </section>

      <section
        class="scene clip"
        id="s2"
        data-start="4"
        data-duration="4"
        data-track-index="1"
      >
        <div class="scene-content">
          <p class="meta" id="s2-meta">Second beat</p>
          <h2 class="display" id="s2-title">Show the payoff</h2>
          <p class="body" id="s2-body">Use this scene for a reveal, key stat, CTA, or visual proof.</p>
        </div>
        <div class="grain"></div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      tl.from("#s1-meta", { y: 16, opacity: 0, duration: 0.4, ease: "power2.out" }, 0.15);
      tl.from("#s1-title", { y: 48, opacity: 0, duration: 0.65, ease: "power3.out" }, 0.28);
      tl.from("#s1-body", { y: 22, opacity: 0, duration: 0.55, ease: "power2.out" }, 0.62);
      tl.to("#s1-orbit", { rotation: 24, duration: 3.4, ease: "sine.inOut" }, 0.3);
      tl.to("#s1", { opacity: 0, duration: 0.25, ease: "power1.in" }, 3.85);

      tl.from("#s2-meta", { y: 16, opacity: 0, duration: 0.4, ease: "power2.out" }, 4.15);
      tl.from("#s2-title", { y: 48, opacity: 0, duration: 0.65, ease: "power3.out" }, 4.28);
      tl.from("#s2-body", { y: 22, opacity: 0, duration: 0.55, ease: "power2.out" }, 4.62);
      tl.to("#s2-title", { scale: 1.015, duration: 2.2, ease: "sine.inOut" }, 5.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
