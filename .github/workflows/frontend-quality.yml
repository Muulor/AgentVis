name: Frontend Quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: frontend-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend quality checks
        run: npm run quality

      - name: Build frontend
        run: npm run build
