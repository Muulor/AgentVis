# Sub-Agent FSM 定义
# 
# 子 Agent 生命周期状态机
# 子 Agent 的 FSM 是线性生命周期，内部 ReAct 循环由 SubAgentRunner 管理
# ═══════════════════════════════════════════════════════════════

version: "1.0"
name: SubAgentFSM
initialState: SPAWNED

states:
  # ─────────────────────────────────────────────────────────────
  # SPAWNED - 刚创建
  # ─────────────────────────────────────────────────────────────
  SPAWNED:
    on:
      CONTEXT_READY:
        next: INPUT_VALIDATED
      CONTEXT_ERROR:
        next: FAILED

  # ─────────────────────────────────────────────────────────────
  # INPUT_VALIDATED - 输入已验证
  # ─────────────────────────────────────────────────────────────
  INPUT_VALIDATED:
    on:
      ACTION_COMPLETED:
        next: RUNNING
      ACTION_FAILED:
        next: FAILED

  # ─────────────────────────────────────────────────────────────
  # RUNNING - 执行中
  # ─────────────────────────────────────────────────────────────
  RUNNING:
    on:
      ACTION_COMPLETED:
        next: OUTPUT_CHECKED
      ACTION_FAILED:
        next: FAILED
      TIMEOUT:
        next: FAILED

  # ─────────────────────────────────────────────────────────────
  # OUTPUT_CHECKED - 输出已检查
  # ─────────────────────────────────────────────────────────────
  OUTPUT_CHECKED:
    on:
      CONTINUE:
        next: COMPLETED
      ACTION_FAILED:
        next: FAILED

  # ─────────────────────────────────────────────────────────────
  # COMPLETED - 成功完成
  # ─────────────────────────────────────────────────────────────
  COMPLETED:
    on: {}

  # ─────────────────────────────────────────────────────────────
  # FAILED - 失败
  # ─────────────────────────────────────────────────────────────
  FAILED:
    on: {}
